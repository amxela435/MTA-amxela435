<!DOCTYPE html>
<html>
<head>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 20px; }
        button { background: #248bcf; color: white; border: none; padding: 15px; border-radius: 10px; width: 100%; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Оформление заказа</h2>
    <p>Товар: Исследование рынка 2026</p>
    <p>Цена: 1000 руб.</p>
    
    <!-- Кнопка, которая ведет на ваш эквайринг (например, ЮKassa или Stripe) -->
    <button id="pay-btn">Оплатить картой</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();
    
        // Получаем реальный ID пользователя из Telegram
        // Если открыто не в телеграме, будет "unknown"
        const userId = tg.initDataUnsafe?.user?.id || "unknown";
    
        document.getElementById('pay-btn').onclick = () => {
            // Формируем ссылку динамически, добавляя ID пользователя
            const baseStripeUrl = "https://buy.stripe.com/test_9B600d7KX9Rh1IScJc4ko00";
            const finalUrl = `${baseStripeUrl}?client_reference_id=${userId}`;
            
            console.log("Переход по ссылке для пользователя:", userId);
            tg.openLink(finalUrl);
        };
    </script>
    
</body>
</html>
